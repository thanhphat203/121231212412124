<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - Trading Insight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { background: '#050505', surface: '#0f0f11', textMain: '#f8fafc', textMuted: '#8b8b93', accent: '#00e58f' },
                    fontFamily: { sans: ['"Inter"', 'sans-serif'], serif: ['"Lora"', 'serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #f8fafc; }
        #progress-bar { position: fixed; top: 0; left: 0; height: 2px; background: #00e58f; width: 0%; z-index: 9999; transition: width 0.1s; box-shadow: 0 0 10px rgba(0,229,143,0.5);}
        
        .markdown-body { font-size: 1.125rem; line-height: 1.85; color: #d4d4d8; font-family: "Lora", serif; font-weight: 400;}
        .markdown-body h2, .markdown-body h3 { font-family: "Inter", sans-serif; color: #fff; letter-spacing: -0.02em;}
        .markdown-body h2 { font-size: 1.875rem; font-weight: 800; margin: 3.5rem 0 1.5rem; }
        .markdown-body h3 { font-size: 1.375rem; font-weight: 700; margin: 2.5rem 0 1rem; color: #e4e4e7;}
        .markdown-body p { margin-bottom: 1.5rem; }
        
        .markdown-body img { border-radius: 1rem; width: 100%; margin: 3rem 0; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 15px 40px -10px rgba(0,0,0,0.8); }
        
        .markdown-body ul { list-style-type: none; padding-left: 0; margin-bottom: 2rem; }
        .markdown-body li { position: relative; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body li::before { content: "—"; position: absolute; left: 0; color: #00e58f; font-weight: bold; font-family: "Inter", sans-serif;}
        
        .markdown-body blockquote { margin: 3rem 0; padding: 1.5rem 2rem; font-size: 1.25rem; font-style: italic; color: #fff; border-left: 3px solid #00e58f; background: linear-gradient(90deg, rgba(0,229,143,0.05) 0%, transparent 100%); }
        .markdown-body strong { color: #fff; font-weight: 600; }
        .markdown-body a { color: #00e58f; text-decoration: none; border-bottom: 1px solid rgba(0,229,143,0.3); transition: all 0.2s;}
        .markdown-body a:hover { border-bottom-color: #00e58f; background-color: rgba(0,229,143,0.1); }

        .toc-link { display: block; padding: 0.4rem 0 0.4rem 1rem; border-left: 1px solid rgba(255,255,255,0.1); color: #6b7280; font-size: 0.8rem; font-family: "Inter", sans-serif; transition: all 0.2s;}
        .toc-link:hover { color: #d4d4d8; border-left-color: rgba(255,255,255,0.3); }
        .toc-link.active { color: #00e58f; border-left-color: #00e58f; font-weight: 600; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 100px); background: #fff; color: #050505; padding: 12px 24px; border-radius: 99px; font-weight: 600; text-sm; opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .toast.show { transform: translate(-50%, 0); opacity: 1; }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <div id="progress-bar"></div>

    <header class="w-full border-b border-white/5 bg-[#050505]/80 backdrop-blur-xl sticky top-0 z-40 transition-all" id="navbar">
        <div class="container mx-auto px-6 max-w-[1300px] h-14 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="index.html" class="flex items-center justify-center w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 text-white transition-colors">
                    <i class="fas fa-arrow-left text-xs"></i>
                </a>
                <div id="sticky-title" class="hidden md:block text-xs font-semibold text-textMuted line-clamp-1 max-w-md opacity-0 transition-opacity duration-300"></div>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="shareTwitter()" class="text-textMuted hover:text-[#1DA1F2] transition"><i class="fab fa-twitter"></i></button>
                <button onclick="copyLink()" class="text-textMuted hover:text-white transition"><i class="fas fa-link"></i></button>
            </div>
        </div>
    </header>

    <main class="flex-grow pt-16 pb-24">
        <article class="container mx-auto px-4 max-w-[1100px] relative">
            <header class="text-center mb-16 max-w-3xl mx-auto">
                <div class="mb-6 inline-block">
                    <span id="post-category" class="text-[10px] font-bold uppercase tracking-widest text-accent mb-4 font-sans">CATEGORY</span>
                </div>
                <h1 id="post-title" class="text-3xl md:text-5xl font-extrabold text-white leading-[1.15] tracking-tight mb-8 font-sans">Đang tải...</h1>
                
                <div class="flex items-center justify-center gap-3 text-xs font-medium text-textMuted font-sans">
                    <img src="https://ui-avatars.com/api/?name=Trading+Insight&background=00e58f&color=050505" class="w-6 h-6 rounded-full">
                    <span class="text-gray-300" id="post-author">Trading Insight Team</span>
                    <span class="w-1 h-1 bg-white/20 rounded-full mx-1"></span>
                    <span id="post-date">Date</span>
                </div>
            </header>

            <div class="w-full aspect-[16/9] md:aspect-[2.5/1] rounded-3xl overflow-hidden mb-16 border border-white/5 relative hidden bg-surface shadow-2xl" id="img-container">
                <img id="post-image" src="" class="w-full h-full object-cover opacity-80">
                <div class="absolute inset-0 bg-gradient-to-t from-[#050505] to-transparent opacity-60"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 relative">
                <div class="hidden lg:block lg:col-span-2"></div>

                <div class="lg:col-span-7">
                    <div id="post-content" class="markdown-body max-w-2xl mx-auto"></div>
                </div>

                <div class="hidden lg:block lg:col-span-3">
                    <div class="sticky top-28 pl-4">
                        <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4 font-sans">Trong bài viết này</h4>
                        <nav id="toc" class="flex flex-col space-y-1"></nav>
                    </div>
                </div>
            </div>
        </article>
    </main>

    <div id="toast" class="toast"><i class="fas fa-check-circle text-accent mr-2"></i> Đã sao chép liên kết</div>

    <script>
        const formatDate = (dateString) => {
            if(!dateString) return 'Mới đây';
            return new Date(dateString).toLocaleDateString('vi-VN', { month: '2-digit', day: '2-digit', year: 'numeric' });
        };
        
        function showToast() { const toast = document.getElementById('toast'); toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000); }
        function copyLink() { navigator.clipboard.writeText(window.location.href); showToast(); }
        function shareTwitter() { window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(document.title)}&url=${encodeURIComponent(window.location.href)}`); }

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            const contentEl = document.getElementById('post-content');

            if (!slug) { 
                contentEl.innerHTML = `<h2 class="text-center font-sans text-xl text-textMuted p-10">Bài viết không tồn tại.</h2>`; 
                document.getElementById('post-title').innerText = "Lỗi hiển thị";
                return; 
            }

            try {
                let posts = [];
                let localData = localStorage.getItem('crypto_posts');
                
                if (localData) {
                    try { posts = JSON.parse(localData); } catch(e) {}
                }
                
                if (!Array.isArray(posts) || posts.length === 0) {
                    const response = await fetch('./data/posts.json'); 
                    if(response.ok) {
                        posts = await response.json(); 
                    }
                }

                const post = posts.find(p => p.slug === slug);
                if (!post) { 
                    contentEl.innerHTML = `<h2 class="text-center font-sans text-xl text-textMuted p-10">Không tìm thấy bài viết.</h2>`; 
                    document.getElementById('post-title').innerText = "Lỗi hiển thị";
                    return; 
                }

                document.title = `${post.title} - Trading Insight`;
                document.getElementById('sticky-title').innerText = post.title;
                document.getElementById('post-category').innerText = post.category || 'ARTICLE';
                document.getElementById('post-title').innerText = post.title;
                document.getElementById('post-date').innerText = formatDate(post.date);

                if(post.image && post.image.trim() !== '') {
                    document.getElementById('post-image').src = post.image;
                    document.getElementById('img-container').classList.remove('hidden');
                }

                contentEl.innerHTML = marked.parse(post.content || '');
                generateTOC();
            } catch (error) { 
                contentEl.innerHTML = `<p class="text-center text-red-400 p-10 font-sans">Lỗi kết nối. Vui lòng thử lại.</p>`; 
                document.getElementById('post-title').innerText = "Lỗi kết nối";
            }
        });

        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
            
            const stickyTitle = document.getElementById('sticky-title');
            if(winScroll > 400) stickyTitle.classList.remove('opacity-0'); else stickyTitle.classList.add('opacity-0');

            const headings = document.querySelectorAll('.markdown-body h2, .markdown-body h3');
            let current = "";
            headings.forEach(h => { if (pageYOffset >= h.offsetTop - 100) current = h.id; });
            document.querySelectorAll('.toc-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === `#${current}`) link.classList.add('active');
            });
        }, { passive: true });

        function generateTOC() {
            const headings = document.getElementById('post-content').querySelectorAll('h2, h3');
            const toc = document.getElementById('toc');
            if(headings.length === 0) { toc.innerHTML = '<span class="text-xs text-gray-600">Không có mục lục</span>'; return; }

            headings.forEach((heading, i) => {
                const id = `heading-${i}`; heading.id = id;
                const link = document.createElement('a');
                link.href = `#${id}`; link.innerText = heading.innerText;
                link.className = `toc-link line-clamp-2 ${heading.tagName === 'H3' ? 'ml-3 text-[12px] opacity-70 border-l-0' : ''}`;
                link.addEventListener('click', (e) => {
                    e.preventDefault(); 
                    window.scrollTo({top: heading.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth'});
                });
                toc.appendChild(link);
            });
            if(toc.firstChild) toc.firstChild.classList.add('active');
        }
    </script>
</body>
</html>
